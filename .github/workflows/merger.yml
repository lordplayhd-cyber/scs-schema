name: Merger

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build files"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  merger:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      
      - name: List PRs with label ready
        id: prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          PRS=$(curl -s \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/pulls?state=open&per_page=100" \
          | jq -r '.[] | select(.labels | any(.name=="ready")) | .number' | tr '\n' ' ')
          echo "numbers=$PRS" >> $GITHUB_OUTPUT
      
      - name: Merge PRs with squash
        if: steps.prs.outputs.numbers != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          for pr in ${{ steps.prs.outputs.numbers }}; do
            echo "Squash merge PR #$pr"
            curl -sS -X PUT \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -d '{"merge_method":"squash"}' \
              https://api.github.com/repos/${REPO}/pulls/$pr/merge
          done
