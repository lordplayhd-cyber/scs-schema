name: Proxy Fork PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  issues: write
    
jobs:
  proxy-pr:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.fork == true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.base_ref }}

      - name: GitHub Actor
        run: |
          git config user.name ${{ github.actor }}
          git config user.email ${{ github.actor }}@users.noreply.github.com

      - name: Capture PR info
        run: |
          echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          echo "PR_AUTHOR=${{ github.event.pull_request.user.login }}" >> $GITHUB_ENV
          echo "PR_AUTHOR_EMAIL=${{ github.event.pull_request.user.login }}@users.noreply.github.com" >> $GITHUB_ENV
          echo "PR_TITLE=${{ github.event.pull_request.title }}"

      - name: Create new branch
        run: |
          git checkout -b pr$PR_NUMBER origin/${{ github.base_ref }}

      - name: Update base branch
        run: |
          git fetch origin ${{ github.base_ref }} --depth=100
          
      - name: Fetch fork branch
        run: |
          git fetch ${{ github.event.pull_request.head.repo.clone_url }} \
            ${{ github.event.pull_request.head.ref }} --depth=100

      - name: Generate patches from fork
        run: |
          git format-patch origin/${{ github.base_ref }}..FETCH_HEAD -o /tmp/patches

      - name: Apply patches with original author
        run: |
          git am --committer-date-is-author-date --3way /tmp/patches/*.patch

      - name: Push branch
        run: |
          git push origin pr$PR_NUMBER --force

      - name: Open new PR
        id: create-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number=$(gh pr create \
            --base ${{ github.base_ref }} \
            --head pr$PR_NUMBER \
            --title "$PR_TITLE | PR #$PR_NUMBER by @$PR_AUTHOR" \
            --body "## Auto-generated PR
          Original PR: #$PR_NUMBER
          Original Author: @$PR_AUTHOR

          ---

          ${{ github.event.pull_request.body }}" \
            --json number -q .number)
          echo "NEW_PR_NUMBER=$pr_number" >> $GITHUB_ENV
          echo "NEW_PR_NUMBER=$pr_number" >> $GITHUB_OUTPUT
          
      # - name: Open new PR
      #   id: create-pr
      #   uses: peter-evans/create-pull-request@v8
      #   with:
      #     token: ${{ secrets.GITHUB_TOKEN }}
      #     branch: pr${{ github.event.pull_request.number }}
      #     base: master
      #     title: "${{ github.event.pull_request.title}} | PR #${{ github.event.pull_request.number }} by @${{ github.event.pull_request.user.login }}"
      #     body: |
      #       ## Auto-generated PR.
      #       Original PR: #${{ github.event.pull_request.number }}
      #       Original author: @${{ github.event.pull_request.user.login }}
      #       Body message:
            
      #       ---
            
      #       ${{ github.event.pull_request.body }}

      - name: Add proxied label
        if: steps.create-pr.outputs.NEW_PR_NUMBER != ''
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          labels: proxied
          number: ${{ steps.create-pr.outputs.NEW_PR_NUMBER }}
          repo: ${{ github.repository }}

      - name: Close original PR
        run: |
          gh pr comment $PR_NUMBER --body "## PR was proxied and closed!
          See the new PR: #${{ steps.create-pr.outputs.NEW_PR_NUMBER }}
          Original Author: @$PR_AUTHOR
          Original PR: #$PR_NUMBER"
          gh pr close $PR_NUMBER
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
