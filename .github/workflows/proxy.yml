name: Proxy Fork PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  issues: write
    
jobs:
  proxy-pr:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.fork == true
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.base_ref }}
          fetch-depth: 0

      - name: GitHub Actor
        run: |
          git config user.name ${{ github.actor }}
          git config user.email ${{ github.actor }}@users.noreply.github.com

      - name: Capture PR info
        run: |
          echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          echo "PR_AUTHOR=${{ github.event.pull_request.user.login }}" >> $GITHUB_ENV
          echo "PR_AUTHOR_EMAIL=${{ github.event.pull_request.user.login }}@users.noreply.github.com" >> $GITHUB_ENV
          echo "PR_TITLE=${{ github.event.pull_request.title }}"

      - name: Fetch fork branch
        run: |
          git fetch ${{ github.event.pull_request.head.repo.clone_url }} \
            ${{ github.event.pull_request.head.ref }}:pr$PR_NUMBER

      - name: Merge fork branch with author attribution
        run: |
          git fetch ${{ github.event.pull_request.head.repo.clone_url }} \
            ${{ github.event.pull_request.head.ref }}:pr$PR_NUMBER
          git merge --no-ff pr$PR_NUMBER
          git commit --amend --author="$PR_AUTHOR <$PR_AUTHOR_EMAIL>" --no-edit

      - name: Open new PR
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: pr${{ github.event.pull_request.number }}
          base: master
          title: "${{ github.event.pull_request.title}} - PR #${{ github.event.pull_request.number }} by @${{ github.event.pull_request.user.login }}"
          body: |
            ## Auto-generated PR.
            Original PR: #${{ github.event.pull_request.number }}
            Original author: @${{ github.event.pull_request.user.login }}
            
            <details><summary>Body message:</summary>
            > ${{ github.event.pull_request.body }}
            </details>

      - name: Add proxied label
        if: steps.create-pr.outputs.pull-request-number != ''
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          labels: proxied
          number: ${{ steps.create-pr.outputs.pull-request-number }}
          repo: ${{ github.repository }}

      - name: Trigger checker workflow
        if: steps.create-pr.outputs.pull-request-number != ''
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"ref":"master","inputs": {"pr_number": "${{ steps.create-pr.outputs.pull-request-number }}","pr_author":"${{ github.event.pull_request.user.login }}"}}' \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/.github/workflows/checker.yml/dispatches

      - name: Close original PR
        run: |
          gh pr comment $PR_NUMBER --body "## PR was proxied and closed!
          See the new PR: #${{ steps.create-pr.outputs.pull-request-number }}
          Original Author: @$PR_AUTHOR
          Original PR: #$PR_NUMBER"
          gh pr close $PR_NUMBER
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
