name: Proxy Fork PRs

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write
    
jobs:
  proxy-pr:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.fork == true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: GitHub Actor
        run: |
          git config user.name ${{ github.actor }}
          git config user.email ${{ github.actor }}@users.noreply.github.com

      - name: Capture PR info
        run: |
          echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          echo "PR_AUTHOR=${{ github.event.pull_request.user.login }}" >> $GITHUB_ENV
          echo "PR_AUTHOR_EMAIL=${{ github.event.pull_request.user.login }}@users.noreply.github.com" >> $GITHUB_ENV

      - name: Fetch fork branch
        run: |
          git fetch ${{ github.event.pull_request.head.repo.clone_url }} \
            ${{ github.event.pull_request.head.ref }}:fork-pr-$PR_NUMBER

      - name: Create new branch with author attribution
        run: |
          git checkout -b proxy-pr-$PR_NUMBER
          git merge --no-ff fork-pr-$PR_NUMBER 
          git commit --amend --author="$PR_AUTHOR <$PR_AUTHOR_EMAIL>" --no-edit

      # - name: Push new branch
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #   run: |
      #     git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
      #     git push origin proxy-pr-$PR_NUMBER

      - name: Open new PR
        uses: peter-evans/create-pull-request@v6
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: proxy-pr-${{ env.PR_NUMBER }}
          base: master
          title: "Proxy of PR #${{ env.PR_NUMBER }} by @${{ env.PR_AUTHOR }}"
          body: |
            This PR was automatically created by a bot.
            Original PR: #${{ env. PR_NUMBER }}
            Original author: @${{ env.PR_AUTHOR }}

      - name: Close original PR
        run: |
          gh pr comment $PR_NUMBER --body "This PR was proxied to a new PR by the bot. Original author: @$PR_AUTHOR"
          gh pr close $PR_NUMBER
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
