name: Build and publish manifest on merge

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  build-and-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm globally and persist path
        run: |
          npm i -g pnpm
          echo "npm bin -g: $(npm bin -g)"
          echo "$(npm bin -g)" >> $GITHUB_PATH
          pnpm -v

      - name: Install dependencies
        run: pnpm install

      - name: Run verify
        run: pnpm verify

      - name: Fetch remote branch for diff base
        run: git fetch origin master:refs/remotes/origin/master --depth=1 || true

      - name: Check for schema changes
        id: check
        run: |
          git fetch --no-tags --prune origin
          if git diff --name-only origin/master..HEAD -- data/schemas | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump version (semver)
        if: steps.check.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: origin/master
          BUMP_TYPE: auto
        run: pnpm node ./scripts/bump.mjs

      - name: Configure git user for CI
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: origin/master
        run: pnpm build

      - name: Prepare branch and commit changes (if any)
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/manifest-${GITHUB_SHA::7}"
          git checkout -b "$BRANCH"
          git add data/manifest.json package.json package-lock.json || true
          if ! git diff --staged --quiet; then
            git commit -m "chore(build): generate manifest and bump version [ci skip]" || echo "no commit"
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create pull request (if manifest changed)
        if: steps.commit.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(build): generate manifest and bump version [ci skip]"
          branch: ${{ steps.commit.outputs.branch }}
          title: "chore(build): generate manifest and bump version"
          body: "Generated manifest and bumped version by workflow."
          labels: "manifest, automated"
          auto-merge: true
          merge-method: squash
