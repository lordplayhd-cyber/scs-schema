name: Build and publish manifest on merge

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install pnpm globally and persist path
        run: |
          npm i -g pnpm
          echo "npm bin -g: $(npm bin -g)"
          echo "$(npm bin -g)" >> $GITHUB_PATH
          # sanity check
          pnpm -v

      - name: Install dependencies
        run: pnpm install
      
      - name: Run verify
        run: pnpm verify

      - name: Fetch remote branch for diff base
        run: |
          git fetch origin master:refs/remotes/origin/master --depth=1 || true
      
      - name: Bump version (semver)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: origin/master
          BUMP_TYPE: auto
        run: |
          git fetch --no-tags --prune origin
          pnpm node ./scripts/bump.mjs
      
      - name: Configure git user for CI
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
      - name: Build manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: origin/master
        run: pnpm build
      
      - name: Commit manifest and package.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/manifest.json package.json package-lock.json || true
          if ! git diff --staged --quiet; then
            git commit -m "chore(build): generate manifest and bump version [ci skip]" || echo "no commit"
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}