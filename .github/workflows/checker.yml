name: Schema checker

on:
  pull_request:
    types: [synchronize, ready_for_review]
  workflow_run:
    workflows: ["Proxy Fork PRs"]
    types: [completed]
  
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Config Actor
        run: |
          git config user.name ${{ github.actor }}
          git config user.email ${{ github.actor }}users.noreply.github.com

      - name: Run formatter script
        id: formatter
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          node ./scripts/formatter.mjs  || true
          git add data/schemas/**/*.json  || true
          if ! git diff --staged --quiet; then
            git commit -m "refactor(schemas): normalize schema JSONs [skip ci]" || true
            git push origin HEAD:${HEAD_REF} || true
            echo "formatted=true" >> $GITHUB_OUTPUT
          else
            echo "formatted=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Run schema validation
        id: validate
        run: |
          set -o pipefail
          if ! OUTPUT=$(node ./scripts/validate.mjs 2>&1); then
            echo "invalid=true" >> $GITHUB_OUTPUT
            echo "output<<EOF" >> $GITHUB_OUTPUT
            echo "$OUTPUT" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "invalid=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR with errors
        if: steps.validate.outputs.invalid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMB: ${{ github.event.pull_request.number }}
        run: |
          BODY=$(jq -Rs . <<< "${{ steps.validate.outputs.output }}")
          curl -sS -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"body": $BODY}' \
            "https://api.github.com/repos/${REPO}/issues/${PR_NUMB}/comments"

      - name: Add invalid-schema label
        if: steps.validate.outputs.invalid == 'true'
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          labels: invalid-schema
          number: ${{ github.event.pull_request.number }}
          repo: ${{ github.repository }}
      
      - name: Fail job if invalid
        if: steps.validate.outputs.invalid == 'true'
        run: exit 1
      
  add-label:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event.pull_request.draft == false && needs.validate.result == 'success'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      
      - name: Check path files modified
        id: check
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git fetch origin ${BASE_REF} --depth=1
          CHANGED=$(git diff --name-only origin/${BASE_REF} ${HEAD_SHA})

          labels=""

          if echo "$CHANGED" | grep -q '^data/schemas'; then
            if ! echo "$CHANGED" | grep -vq '^data/schemas'; then
              labels="validated"
            fi
          fi
        
          if echo "$CHANGED" | grep -Eq '^(README\.md|CHANGELOG\.md|CONTRIBUTING\.md|CODE_OF_CONDUCT\.md|LICENSE|docs/)'; then
            labels="$labels,documentation"
          fi

          if echo "$CHANGED" | grep -vq '^data/schemas/' && ! echo "$CHANGED" | grep -Eq '^(README\.md|CHANGELOG\.md|CONTRIBUTING\.md|CODE_OF_CONDUCT\.md|LICENSE|docs/)'; then
            labels="$labels,system"
          fi

          labels=$(echo "$labels" | sed 's/^,//')

          echo "labels=$labels" >> $GITHUB_OUTPUT
      
      - name: Get current labels
        id: current-labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMB: ${{ github.event.pull_request.number }}
        run: |
          labels=$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${REPO}/issues/${PR_NUMB}/labels" \
            | jq -r '.[].name' | xargs)
          echo "labels=$labels" >> $GITHUB_OUTPUT
          
      - name: Remove labels
        if: steps.current-labels.outputs.labels != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMB: ${{ github.event.pull_request.number }}
        run: |
          labels="${{ steps.current-labels.outputs.labels }}"
          for label in $labels; do
            echo "Removing $label"
            curl -sS -X DELETE \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/issues/${PR_NUMB}/labels/$label"
          done
      
      - name: Add label
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          labels: ${{ steps.check.outputs.labels }}
          number: ${{ github.event.pull_request.number }}
          repo: ${{ github.repository }}
