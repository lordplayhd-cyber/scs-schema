name: Auto merge

on:
  schedule:
    - cron: "0 0 * * *" # all day 00:00 UTC

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  push-pr-update:
    runs-on: ubuntu-latest
    steps:
      - name: Run pr-update workflows triggered
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKENS }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"bump-schemas","client_payload":{"pr_number":'${{ github.event.pull_request.number }}'}}'

  auto-merge:
    runs-on: ubuntu-latest
    needs: push-pr-update
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: List PRs with label bumped
        id: prs
        run: |
          PRS=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?state=open&per_page=100" \
          | jq -r '.[] | select(.labels[].name=="bumped") | .number' | tr '\n' ' ')
          echo "numbers=$PRS" >> $GITHUB_OUTPUT
      
      - name: Merge PRs com squash
        if: steps.prs.outputs.numbers != ''
        run: |
          for pr in ${{ steps.prs.outputs.numbers }}; do
            echo "Squash merge PR #$pr"
            curl -X PUT \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/pulls/$pr/merge \
              -d '{"merge_method":"squash"}'
          done
