name: CI bump, verify and build on PR

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

env:
  REPO_USER: ${{ github.repository_owner }}
  REPO_NAME: ${{ github.event.repository.name }}

jobs:
  pr-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (base context)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm and dependencies
        run: |
          npm i -g pnpm
          echo "$(npm bin -g)" >> $GITHUB_PATH
          pnpm install

      - name: Fetch PR head and checkout it locally
        run: |
          PR_HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          git fetch origin "${PR_HEAD_SHA}"
          git checkout -b pr-head "${PR_HEAD_SHA}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure origin/master exists
        run: git fetch --no-tags --prune origin

      - name: Run bump (only modified schema files)
        env:
          BASE_REF: origin/master
          BUMP_TYPE: auto
        run: |
          node ./scripts/bump.mjs || true

      - name: Run verify (update manifest locally)
        run: pnpm verify

      - name: Build manifest using PR head SHA
        env:
          REF: ${{ github.event.pull_request.head.sha }}
          REPO_USER: ${{ env.REPO_USER }}
          REPO_NAME: ${{ env.REPO_NAME }}
        run: |
          node ./scripts/build.mjs "${REF}" --no-commit

      - name: Show git status (debug)
        run: git status --porcelain

      - name: Commit generated changes and push to release branch
        id: commit_and_push
        run: |
          set -e
          # If there are changes, create a release branch and push
          if ! git diff --quiet; then
            BRANCH="release/ci-${{ github.run_id }}-${{ github.event.pull_request.number }}"
            git checkout -b "$BRANCH"
            git add -A
            git commit -m "chore(ci): bump schemas, update manifest [ci skip]" || true
            git push origin "$BRANCH"
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
            echo "pushed=true" >> $GITHUB_OUTPUT
          else
            echo "pushed=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR for generated changes and comment on original PR
        if: steps.commit_and_push.outputs.pushed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sourcePrNumber = context.payload.pull_request.number;
            const releaseBranch = '${{ steps.commit_and_push.outputs.branch }}';

            // Use the original PR title and body unchanged
            const originalTitle = context.payload.pull_request.title || `ci: generated changes (from PR #${sourcePrNumber})`;
            const originalBody = context.payload.pull_request.body || '';

            // Build the body for the generated PR
            let body = '';
            body += `This PR was created by CI to apply generated changes from PR #${sourcePrNumber}.\n\n`;
            body += `Source PR: ${context.payload.pull_request.html_url}\n\n`;
            body += `Original PR title: ${originalTitle}\n\n`;
            body += `Original PR body:\n${originalBody}\n\n`;
            body += `CI bumped schema meta.version where needed and updated data/manifest.json with CDN URLs built from the PR head SHA.`;

            // Create PR from release branch into master using the original PR title
            const { data: newPr } = await github.rest.pulls.create({
              owner,
              repo,
              title: originalTitle,
              head: releaseBranch,
              base: 'master',
              body
            });

            // Comment on the original PR linking the generated PR

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: sourcePrNumber,
              body: `CI generated changes were pushed to branch ${releaseBranch} and a PR was opened: ${newPr.html_url}`
            });

      - name: No changes to commit
        if: steps.commit_and_push.outputs.pushed == 'false'
        run: echo "No generated changes to commit."
