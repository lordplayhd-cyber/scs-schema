name: PR schema automation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: pr-schema-automation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  update-schemas:
    name: Update schemas, bump versions and build manifest
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout PR branch (full history)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ensure dependencies (semver)
        run: |
          npm i

      - name: Configure git user
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Run verify script (update manifest entries for new files)
        id: verify
        env:
          REPO_USER: ${{ secrets.REPO_USER || github.repository_owner }}
          REPO_NAME: ${{ secrets.REPO_NAME || github.event.repository.name }}
        run: |
          node ./scripts/verify.mjs || true
          git add data/manifest.json || true
          # record whether verify changed anything
          if ! git diff --staged --quiet; then
            git commit -m "chore: update data/manifest.json (verify)" || true
            echo "manifest_changed=true" >> $GITHUB_OUTPUT
          else
            echo "manifest_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Run bump script (bump meta.version for edited schemas)
        id: bump
        env:
          BASE_REF: origin/master
        run: |
          # bump.mjs will detect changed schema files and bump meta.version
          node ./scripts/bump.mjs || true
          # stage any modified schema files
          git add data/schemas || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: bump schema meta.version for changed files" || true
            echo "bumped=true" >> $GITHUB_OUTPUT
          else
            echo "bumped=false" >> $GITHUB_OUTPUT
          fi

      - name: Build manifest with jsDelivr URLs using current commit SHA
        id: build
        run: |
          # get current HEAD (after any commits above)
          REF=$(git rev-parse --verify HEAD)
          echo "Using REF=$REF"
          # pass REF to build so it composes jsDelivr URLs with the commit SHA
          node ./scripts/build.mjs "$REF"
          git add data/manifest.json || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: build manifest with jsDelivr URLs @${REF}" || true
            echo "built=true" >> $GITHUB_OUTPUT
          else
            echo "built=false" >> $GITHUB_OUTPUT
          fi

      - name: Push changes back to PR branch (if any)
        if: steps.verify.outputs.manifest_changed == 'true' || steps.bump.outputs.bumped == 'true' || steps.build.outputs.built == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # push to the PR head branch
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Comment on PR with summary
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // debug: inspect playload and if have github.rest.issue
            console.log('eventName:' context.eventName);
            console.log('payload keys:', Object.keys(context.payload || {}));
            console.log('github.rest exists:', !!github.rest && !!github.rest.issue)

            const prNumber = (context.payload && context.payload.pull_request && context.payload.pull_request.number) || context.issue.number;
            if (!prNumber) {
              console.log('No PR number found, skipping comment')
              return
            }

            const number = pr.number;
            const changed = [];
            if (process.env.MANIFEST_CHANGED === 'true') changed.push('manifest updated');
            if (process.env.BUMPED === 'true') changed.push('schema versions bumped');
            if (process.env.BUILT === 'true') changed.push('manifest rebuilt with jsDelivr URLs');

            const body = `Automated schema check completed. Changes: ${changed.length ? changed.join(', ') : 'no changes needed'}.`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            })
        env:
          MANIFEST_CHANGED: ${{ steps.verify.outputs.manifest_changed || 'false' }}
          BUMPED: ${{ steps.bump.outputs.bumped || 'false' }}
          BUILT: ${{ steps.build.outputs.built || 'false' }}
