name: PR schema automation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: pr-schema-automation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  update-schemas:
    name: Update schemas, bump versions and build manifest
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout PR branch (full history)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ensure dependencies (semver)
        run: |
          npm i

      - name: Configure git user
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Run verify script (update manifest entries for new files)
        id: verify
        env:
          REPO_USER: ${{ secrets.REPO_USER || github.repository_owner }}
          REPO_NAME: ${{ secrets.REPO_NAME || github.event.repository.name }}
        run: |
          node ./scripts/verify.mjs || true
          git add data/manifest.json || true
          # record whether verify changed anything
          if ! git diff --staged --quiet; then
            git commit -m "chore: update data/manifest.json (verify)" || true
            echo "manifest_changed=true" >> $GITHUB_OUTPUT
          else
            echo "manifest_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Compute merge-base for diff
        id: mergebase
        run: |
          # fetch base branch
          git fetch origin master:refs/remotes/origin/master || true
          # compute merge-base between PR head and base branch
          BASE=$(git merge-base origin/master HEAD || true)
          echo "base_ref=$BASE" >> $GITHUB_OUTPUT

      - name: Run bump script (bump meta.version for edited schemas)
        id: bump
        env:
          BASE_REF: ${{ steps.mergebase.outputs.base_ref }}
        run: |
          node ./scripts/bump.mjs || true
          # stage any modified schema files
          git add data/schemas || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: bump schema meta.version for changed files" || true
            echo "bumped=true" >> $GITHUB_OUTPUT
          else
            echo "bumped=false" >> $GITHUB_OUTPUT
          fi

      - name: Build manifest with jsDelivr URLs using current commit SHA
        id: build
        run: |
          # get current HEAD (after any commits above)
          REF=$(git rev-parse --verify HEAD)
          echo "Using REF=$REF"
          # pass REF to build so it composes jsDelivr URLs with the commit SHA
          node ./scripts/build.mjs "$REF"
          git add data/manifest.json || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: build manifest with jsDelivr URLs @${REF}" || true
            echo "built=true" >> $GITHUB_OUTPUT
          else
            echo "built=false" >> $GITHUB_OUTPUT
          fi

      - name: Push changes back to PR branch (if any)
        if: steps.verify.outputs.manifest_changed == 'true' || steps.bump.outputs.bumped == 'true' || steps.build.outputs.built == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # push to the PR head branch
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Comment on PR with summary
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          MANIFEST_CHANGED: $${{ steps.verify.outputs.manifest_changed || 'false' }}
          BUMPED: ${{ steps.bump.outputs.bumped || 'false' }}
          BUILT: ${{ steps.build.outputs.built || 'false' }}
        run: |
          PR=${PR_NUMBER:-$ISSUE_NUMBER}
          if [ -z "$PR" ]; then
            echo "No PR/issue number found, skipping comment"
            exit 0
          fi

          CHANGES=()
          if [ "$MANIFEST_CHANGED" = "true" ]; then CHANGES+=("manifest updated"); fi
          if [ "$BUMPED" = "true" ]; then CHANGES+=("schema versions bumped"); fi
          if [ "$BUILT" = "true" ]; then CHANGES+=("manifest rebuilt with jsDelivr URLs"); fi

          if [ ${#CHANGES[@]} -gt 0 ]; then
            BODY="Automated schema check completed. Changes: ${CHANGES[*]}."
          else
            BODY="Automated schema check completed. Changes: no changes needed."
          fi

          PAYLOAD=$(jq -nc --arg body "$BODY" '{body:$body}')

          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          API="https://api.github.com/repos/${OWNER}/${REPO}/issues/${PR}/comments"

          echo "Posting comment to ${OWNER}/${REPO}#${PR}"
          curl -sS -X POST \
            -H "Authorization: Baerer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$API" \
            -d "$PAYLOAD" \
            || { echo "Failed to post comment"; exit 1; }
